name: Release firmware

# On a version tag, build the Heltec V4 firmware and publish the OTA-able
# app image plus a version.json describing it as release assets. Sapwood's
# `npm run sync:firmware` pulls these so flashing and OTA always ship the
# current firmware — no more hand-copied, drifting binaries.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release + upload assets via the built-in token

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The tag (vX.Y.Z) is the source of truth; it must match the firmware's
      # own Cargo version so the boot screen and FIRMWARE_INFO agree with it.
      - name: Resolve + verify version
        id: ver
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(grep -m1 '^version' firmware/Cargo.toml | cut -d'"' -f2)"
          if [ "$version" != "$cargo_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($version) != firmware/Cargo.toml ($cargo_version)"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware
      - uses: taiki-e/install-action@v2
        with:
          tool: espflash

      - name: Build firmware (Heltec V4, release)
        working-directory: firmware
        env:
          ESP_IDF_SDKCONFIG_DEFAULTS: "sdkconfig.defaults;sdkconfig.defaults.heltec-v4"
        run: cargo build --release --no-default-features --features heltec-v4

      - name: Save the OTA app image + describe it
        working-directory: firmware
        run: |
          set -eu
          espflash save-image --chip esp32s3 \
            target/xtensa-esp32s3-espidf/release/heartwood-esp32 app.bin
          size=$(stat -c%s app.bin)
          limit=2097152
          if [ "$size" -gt "$limit" ]; then
            echo "::error::app image ($size B) exceeds the 2 MB ota_0 slot ($limit B)"
            exit 1
          fi
          sha=$(sha256sum app.bin | cut -d' ' -f1)
          jq -n \
            --arg v "${{ steps.ver.outputs.version }}" \
            --arg sha "$sha" \
            --argjson bytes "$size" \
            --arg at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{version: $v, builtAt: $at, boards: {"heltec-v4": {app: "app.bin", sha256: $sha, bytes: $bytes}}}' \
            > version.json
          cat version.json

      - name: Publish release with the firmware assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release create "$GITHUB_REF_NAME" \
            --title "Firmware $GITHUB_REF_NAME" \
            --notes "Heltec V4 firmware ${GITHUB_REF_NAME}. \`app.bin\` is the OTA-able image; \`version.json\` describes it. Pull into Sapwood with \`npm run sync:firmware\`." \
            firmware/app.bin firmware/version.json
