name: Release firmware

# On a version tag, build every supported board, then publish each board's
# OTA-able app image plus a version.json describing them all as release assets.
# Sapwood's `npm run sync:firmware` pulls these so flashing and OTA always ship
# the current firmware — no more hand-copied, drifting binaries.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release + upload assets via the built-in token

jobs:
  # One isolated build per board (own runner, own target dir — no feature/sdkconfig
  # cross-contamination). Each emits its app image + a manifest fragment.
  build:
    strategy:
      fail-fast: true
      matrix:
        board: [heltec-v4, heltec-v3]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware
      - uses: taiki-e/install-action@v2
        with:
          tool: espflash

      - name: Build ${{ matrix.board }} (release)
        working-directory: firmware
        env:
          ESP_IDF_SDKCONFIG_DEFAULTS: "sdkconfig.defaults;sdkconfig.defaults.${{ matrix.board }}"
        run: cargo build --release --no-default-features --features ${{ matrix.board }}

      - name: Save the OTA app image + describe it
        working-directory: firmware
        run: |
          set -eu
          out="app-${{ matrix.board }}.bin"
          espflash save-image --chip esp32s3 \
            target/xtensa-esp32s3-espidf/release/heartwood-esp32 "$out"
          size=$(stat -c%s "$out")
          limit=2097152
          if [ "$size" -gt "$limit" ]; then
            echo "::error::${{ matrix.board }} app image ($size B) exceeds the 2 MB ota_0 slot ($limit B)"
            exit 1
          fi
          sha=$(sha256sum "$out" | cut -d' ' -f1)
          jq -n --arg b "${{ matrix.board }}" --arg a "$out" --arg s "$sha" --argjson n "$size" \
            '{($b): {asset: $a, sha256: $s, bytes: $n}}' > "frag-${{ matrix.board }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: fw-${{ matrix.board }}
          path: |
            firmware/app-${{ matrix.board }}.bin
            firmware/frag-${{ matrix.board }}.json

  # Aggregate the per-board outputs into one release.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify the tag matches firmware/Cargo.toml
        run: |
          set -eu
          version="${GITHUB_REF_NAME#v}"
          cargo_version="$(grep -m1 '^version' firmware/Cargo.toml | cut -d'"' -f2)"
          if [ "$version" != "$cargo_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME ($version) != firmware/Cargo.toml ($cargo_version)"
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble version.json + gather images
        run: |
          set -eu
          mkdir -p out
          find dist -name 'app-*.bin' -exec cp {} out/ \;
          boards="$(jq -s 'add' $(find dist -name 'frag-*.json'))"
          jq -n \
            --arg v "${GITHUB_REF_NAME#v}" \
            --arg at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson boards "$boards" \
            '{version: $v, builtAt: $at, boards: $boards}' > out/version.json
          cat out/version.json

      - name: Publish release with the firmware assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release create "$GITHUB_REF_NAME" \
            --title "Firmware $GITHUB_REF_NAME" \
            --notes "Heltec firmware ${GITHUB_REF_NAME}. Per-board \`app-<board>.bin\` images; \`version.json\` describes them. Pull into Sapwood with \`npm run sync:firmware\`." \
            out/app-*.bin out/version.json
