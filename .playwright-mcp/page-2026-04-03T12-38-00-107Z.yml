                - link "Project Chat" [ref=e116] [cursor=pointer]:
                  - /url: https://rustcrypto.zulipchat.com/#narrow/stream/260040-elliptic-curves
                  - img "Project Chat" [ref=e117]
              - paragraph [ref=e118]:
                - link "secp256k1" [ref=e119] [cursor=pointer]:
                  - /url: https://en.bitcoin.it/wiki/Secp256k1
                - text: (a.k.a. K-256) elliptic curve library written in pure Rust with support for
                - link "ECDSA" [ref=e120] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Elliptic_Curve_Digital_Signature_Algorithm
                - text: signing/verification/public-key recovery, Taproot
                - link "Schnorr signatures" [ref=e121] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Schnorr_signature
                - text: as defined in BIP340, Elliptic Curve Diffie-Hellman (ECDH), and general-purpose secp256k1 elliptic curve group operations which can be used to implement arbitrary group-based protocols.
              - paragraph [ref=e122]:
                - text: Uses traits and base types from the
                - link "elliptic-curve" [ref=e123] [cursor=pointer]:
                  - /url: https://github.com/RustCrypto/traits/tree/master/elliptic-curve
                  - code [ref=e124]: elliptic-curve
                - text: crate.
              - paragraph [ref=e125]:
                - text: Optionally includes a secp256k1
                - link "arithmetic" [ref=e126] [cursor=pointer]:
                  - /url: https://docs.rs/k256/latest/k256/arithmetic/index.html
                  - code [ref=e127]: arithmetic
                - text: feature providing scalar and point types (projective/affine) with support for constant-time scalar multiplication. Additionally, implements traits from the
                - link "group" [ref=e128] [cursor=pointer]:
                  - /url: https://github.com/zkcrypto/group
                  - code [ref=e129]: group
                - text: crate which can be used to generically construct group-based protocols.
              - paragraph [ref=e130]:
                - link "Documentation" [ref=e131] [cursor=pointer]:
                  - /url: https://docs.rs/k256/
              - heading "Security Notes" [level=3] [ref=e132]
              - paragraph [ref=e133]:
                - text: This crate has been
                - link "audited by NCC Group" [ref=e134] [cursor=pointer]:
                  - /url: https://research.nccgroup.com/2023/08/30/public-report-entropy-rust-cryptography-review/
                - text: ", which found a high severity issue in the ECDSA/secp256k1 implementation and another high severity issue in the Schnorr/secp256k1 signature implementation, both of which have since been corrected. We would like to thank"
                - link "Entropy" [ref=e135] [cursor=pointer]:
                  - /url: https://entropy.xyz/
                - text: for funding the audit.
              - paragraph [ref=e136]:
                - text: This crate has been designed with the goal of ensuring that secret-dependent secp256k1 operations are performed in constant time (using the
                - code [ref=e137]: subtle
                - text: crate and constant-time formulas). However, it is not suitable for use on processors with a variable-time multiplication operation (e.g. short circuit on multiply-by-zero / multiply-by-one, such as certain 32-bit PowerPC CPUs and some non-ARM microcontrollers).
              - paragraph [ref=e138]: USE AT YOUR OWN RISK!
              - heading "Supported Algorithms" [level=3] [ref=e139]
              - list [ref=e140]:
                - listitem [ref=e141]:
                  - link "Elliptic Curve Diffie-Hellman (ECDH)" [ref=e142] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Elliptic-curve_Diffie-Hellman
                  - text: ": gated under the"
                  - code [ref=e143]: ecdh
                  - text: feature. Note that this is technically ephemeral secp256k1 Diffie-Hellman (a.k.a. ECDHE)
                - listitem [ref=e144]:
                  - link "Elliptic Curve Digital Signature Algorithm (ECDSA)" [ref=e145] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Elliptic_Curve_Digital_Signature_Algorithm
                  - text: ": gated under the"
                  - code [ref=e146]: ecdsa
                  - text: feature. Support for ECDSA/secp256k1 signing and verification, applying
                  - link "low-S normalization (BIP 0062)" [ref=e147] [cursor=pointer]:
                    - /url: https://github.com/bitcoin/bips/blob/master/bip-0062.mediawiki
                  - text: as used in consensus-critical applications, and additionally supports secp256k1 public-key recovery from ECDSA signatures (as used by e.g. Ethereum)
                - listitem [ref=e148]:
                  - text: Taproot
                  - link "Schnorr signatures" [ref=e149] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Schnorr_signature
                  - text: (as defined in
                  - link "BIP0340" [ref=e150] [cursor=pointer]:
                    - /url: https://github.com/bitcoin/bips/blob/master/bip-0340.mediawiki
                  - text: "): next-generation signature algorithm based on group operations enabling elegant higher-level constructions like multisignatures."
              - heading "About secp256k1 (K-256)" [level=3] [ref=e151]
              - paragraph [ref=e152]:
                - link "secp256k1" [ref=e153] [cursor=pointer]:
                  - /url: https://en.bitcoin.it/wiki/Secp256k1
                - text: is a Koblitz curve commonly used in cryptocurrency applications. The “K-256” name follows NIST notation where P = prime fields, B = binary fields, and K = Koblitz curves.
              - paragraph [ref=e154]:
                - text: The curve is specified as
                - code [ref=e155]: secp256k1
                - text: "by Certicom’s SECG in “SEC 2: Recommended Elliptic Curve Domain Parameters”:"
              - paragraph [ref=e156]:
                - link "https://www.secg.org/sec2-v2.pdf" [ref=e157] [cursor=pointer]:
                  - /url: https://www.secg.org/sec2-v2.pdf
              - paragraph [ref=e158]:
                - text: secp256k1 is primarily notable for usage in Bitcoin and other cryptocurrencies, particularly in conjunction with the
                - link "Elliptic Curve Digital Signature Algorithm (ECDSA)" [ref=e159] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Elliptic_Curve_Digital_Signature_Algorithm
                - text: . Owing to its wide deployment in these applications, secp256k1 is one of the most popular and commonly used elliptic curves.
