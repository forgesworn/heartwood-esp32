# common/.cargo/config.toml
#
# Override the root .cargo/config.toml which targets xtensa-esp32s3-espidf.
# The common crate has no ESP-IDF dependencies and compiles on the host for
# `cargo test`.
#
# Cargo config files are merged from parent to child; there is no "use host
# default" escape hatch. We must name the target explicitly. CI should set
# CARGO_BUILD_TARGET to the appropriate host triple if not x86_64-apple-darwin.

[build]
target = "x86_64-apple-darwin"

[unstable]
build-std = []
