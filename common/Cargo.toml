[package]
name = "heartwood-common"
version = "0.1.0"
edition = "2021"
description = "Shared crypto for heartwood-esp32 — derivation, encoding, types"

[dependencies]
k256 = { version = "0.13", default-features = false, features = ["schnorr", "arithmetic"], optional = true }
secp256k1 = { version = "0.29", default-features = false, features = ["alloc"], optional = true }
hmac = { version = "0.12", default-features = false }
sha2 = { version = "0.10", default-features = false }
zeroize = { version = "1", default-features = false, features = ["derive"] }
bech32 = { version = "0.11", default-features = false, features = ["alloc"] }
crc32fast = "1"
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
default = ["k256-backend"]
k256-backend = ["dep:k256"]
secp256k1-backend = ["dep:secp256k1"]
nip46 = ["dep:serde", "dep:serde_json"]
