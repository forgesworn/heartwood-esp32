# All Rust compiles for xtensa-esp8266; the final link needs the ESP8266 GNU
# toolchain, `xtensa-lx106-elf-gcc`. espup does NOT install it (and the esp32
# `xtensa-esp-elf` binutils refuse the lx106 objects — different baked-in xtensa
# core config). Install Espressif's prebuilt and put its bin/ on PATH:
#
#   curl -L https://dl.espressif.com/dl/xtensa-lx106-elf-gcc8_4_0-esp-2020r3-macos.tar.gz \
#     | tar -xz -C ~/.local
#   export PATH="$HOME/.local/xtensa-lx106-elf/bin:$PATH"
#
# (macOS builds are x86_64 — runs via Rosetta on Apple Silicon. Linux/arm64
# builds: earlephilhower/esp-quick-toolchain releases.)
[build]
target = "xtensa-esp8266-none-elf"

[target.xtensa-esp8266-none-elf]
linker = "xtensa-lx106-elf-gcc"
rustflags = [
  "-C", "link-arg=-nostartfiles",
  "-C", "link-arg=-Wl,-Tlink.x",
]

[unstable]
build-std = ["core"]
build-std-features = ["compiler-builtins-no-f16-f128", "compiler-builtins-mem"]
