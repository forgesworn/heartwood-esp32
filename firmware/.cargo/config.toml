[build]
target = "xtensa-esp32s3-espidf"

[target.xtensa-esp32s3-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"

# Classic ESP32 (Xtensa LX6) target -- the T-Display board. Selected via
# `--target xtensa-esp32-espidf` by scripts/build-firmware.sh, which also
# exports MCU=esp32 and the T-Display sdkconfig fragment.
[target.xtensa-esp32-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"

# ESP32-C6 (RISC-V rv32imac) target -- the Waveshare ESP32-C6-LCD-1.47 board.
# Selected via `--target riscv32imac-esp-espidf` by scripts/build-firmware.sh,
# which also exports MCU=esp32c6 and the C6 sdkconfig fragment.
[target.riscv32imac-esp-espidf]
linker = "ldproxy"
runner = "espflash flash --monitor"

[unstable]
build-std = ["std", "panic_abort"]

[env]
MCU = "esp32s3"
# esp-idf version
ESP_IDF_VERSION = "v5.3.2"
# Cross-compiler for C FFI crates (secp256k1-sys) -- cc crate needs this
CC_xtensa_esp32s3_espidf = "xtensa-esp32s3-elf-gcc"
# secp256k1-sys must be compiled with -mlongcalls. Without it, once the binary
# grows (e.g. WiFi/TLS added), secp256k1's internal call8 instructions go out
# of range and the link fails with "dangerous relocation: call8 ... out of
# range". ESP-IDF's own C already uses -mlongcalls; this extends it to the
# cc-built C FFI crates. (Surfaced by the WiFi heap/size spike, 8 Jun.)
CFLAGS_xtensa_esp32s3_espidf = "-mlongcalls"
# Classic ESP32 (T-Display) C FFI cross-compiler + the same -mlongcalls flag
# (the unified xtensa-esp-elf-gcc handles esp32 and esp32s3 alike). MCU=esp32
# is exported by the build script, not here, so the default build stays S3.
CC_xtensa_esp32_espidf = "xtensa-esp32-elf-gcc"
CFLAGS_xtensa_esp32_espidf = "-mlongcalls"
# ESP32-C6 (RISC-V) C FFI cross-compiler. RISC-V has no Xtensa call8/call4 range
# limit, so -mlongcalls (an Xtensa-only flag) is neither needed nor valid here.
CC_riscv32imac_esp_espidf = "riscv32-esp-elf-gcc"
# Board-specific sdkconfig fragment selection. This is the default for the
# `heltec-v4` feature (the cargo default). For a V3 build, override this
# variable at invocation time before `cargo build`, e.g.:
#
#   ESP_IDF_SDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.heltec-v3" \
#     cargo build --no-default-features --features heltec-v3
#
# Or use scripts/build-firmware.sh v3. The `force = false` default on
# [env] entries means the shell value wins when both are set, so the
# override is just "export before cargo". Layering: later files override
# earlier ones, per esp-idf-sys BUILD-OPTIONS.md.
ESP_IDF_SDKCONFIG_DEFAULTS = "sdkconfig.defaults;sdkconfig.defaults.heltec-v4"
